<div class="wire-wrapper">
  <svg
    #svgRef
    [attr.viewBox]="viewBox()"
    preserveAspectRatio="none"
    xmlns="http://www.w3.org/2000/svg"
    width="100%"
    height="100%"
    class="electric-svg"
  >
    <!-- ===================== -->
    <!-- DEFINITIONS SECTION   -->
    <!-- ===================== -->
    <defs>
      <!-- 1️⃣ Neon Glow Filter (Optimized) -->
      <filter
        [id]="'neonGlow-' + instanceId"
        x="-100%"
        y="-100%"
        width="300%"
        height="300%"
      >
        <feGaussianBlur stdDeviation="1.2" result="blur1" />
        <feDropShadow
          dx="0"
          dy="0"
          stdDeviation="1.5"
          [attr.flood-color]="color()"
          flood-opacity="0.7"
        />
        <feComposite in="SourceGraphic" operator="over" />
      </filter>

      <!-- 2️⃣ Core Glow Filter -->
      <filter
        [id]="'coreGlow-' + instanceId"
        x="-100%"
        y="-100%"
        width="300%"
        height="300%"
      >
        <feGaussianBlur stdDeviation="0.3" />
        <feComposite in="SourceGraphic" operator="over" />
      </filter>

      <!-- 3️⃣ Arrow Shadow (Optimized) -->
      <filter
        [id]="'arrowShadow-' + instanceId"
        x="-100%"
        y="-100%"
        width="300%"
        height="300%"
      >
        <feDropShadow
          dx="0"
          dy="1.2"
          stdDeviation="0.8"
          flood-color="black"
          flood-opacity="0.25"
        />
        <feDropShadow
          dx="0"
          dy="2.5"
          stdDeviation="1.5"
          flood-color="black"
          flood-opacity="0.2"
        />
      </filter>

      <!-- 4️⃣ Path Shadow (Single Version - Removed Duplicate) -->
      <filter
        [id]="'housePathShadow-' + instanceId"
        x="-100%"
        y="-100%"
        width="300%"
        height="300%"
      >
        <feGaussianBlur in="SourceAlpha" stdDeviation="0.8" result="blur" />
        <feColorMatrix
          type="matrix"
          values="0 0 0 0 0.15
                  0 0 0 0 0.18
                  0 0 0 0 0.19
                  0 0 0 0.35 0"
          result="shadowMat"
        />
        <feOffset dx="0" dy="0.5" />
        <feMerge>
          <feMergeNode in="shadowMat" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- 5️⃣ Merge Gradient -->
      <radialGradient [id]="'mergeGrad-' + instanceId">
        <stop offset="0%" stop-color="black" />
        <stop offset="60%" stop-color="black" stop-opacity="0.8" />
        <stop offset="100%" stop-color="white" />
      </radialGradient>

      <!-- 6️⃣ Particle Mask -->
      <mask [id]="'particleMask-' + instanceId">
        <rect x="-100%" y="-100%" width="300%" height="300%" fill="white" />
        <circle
          [attr.cx]="maskCenter().x"
          [attr.cy]="maskCenter().y"
          r="8"
          [attr.fill]="'url(#mergeGrad-' + instanceId + ')'"
        />
      </mask>

      <!-- 7️⃣ Thunder/Lightning Filter (Refined & Sharp) -->
      <filter
        [id]="'lightningFilter-' + instanceId"
        x="-200%"
        y="-200%"
        width="500%"
        height="500%"
      >
        <!-- High Frequency Turbulence -->
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.4"
          numOctaves="1"
          result="noise"
        >
          <animate
            attributeName="seed"
            from="1"
            to="1000"
            dur="1s"
            repeatCount="indefinite"
          />
        </feTurbulence>

        <!-- Subtle Displacement (Stay close to wire) -->
        <feDisplacementMap
          in="SourceGraphic"
          in2="noise"
          scale="4"
          result="displaced"
        />

        <!-- Sharp Glow -->
        <feGaussianBlur in="displaced" stdDeviation="0.4" result="glow1" />
        <feGaussianBlur in="displaced" stdDeviation="1.5" result="glow2" />

        <feMerge>
          <feMergeNode in="glow2" />
          <feMergeNode in="glow1" />
          <feMergeNode in="displaced" />
        </feMerge>
      </filter>

      <!-- 9️⃣ Arrowhead -->
      <marker
        [id]="'arrowhead-' + instanceId"
        viewBox="0 0 10 10"
        refX="10"
        refY="5"
        markerWidth="6"
        markerHeight="6"
        orient="auto-start-reverse"
      >
        <path
          d="M 0 0 L 10 5 L 0 10 L 2 5 Z"
          [attr.fill]="color()"
          [attr.filter]="'url(#arrowShadow-' + instanceId + ')'"
        />
      </marker>
    </defs>

    <!-- ===================== -->
    <!-- STATIC BASE LAYER     -->
    <!-- ===================== -->

    <!-- Soft base shadow -->
    <path
      [attr.d]="pathData()"
      fill="none"
      [attr.stroke]="color()"
      stroke-width="3.2"
      stroke-opacity="0.08"
      stroke-linecap="round"
      stroke-linejoin="round"
      [attr.filter]="'url(#housePathShadow-' + instanceId + ')'"
    />

    <!-- Core wire -->
    <path
      #pathRef
      [attr.d]="pathData()"
      fill="none"
      [attr.stroke]="color()"
      stroke-width="1.2"
      stroke-opacity="0.9"
      stroke-linecap="round"
      stroke-linejoin="round"
      [attr.filter]="'url(#housePathShadow-' + instanceId + ')'"
      [attr.marker-end]="
        !reverse() ? 'url(#arrowhead-' + instanceId + ')' : null
      "
      [attr.marker-start]="
        reverse() ? 'url(#arrowhead-' + instanceId + ')' : null
      "
    />

    <!-- ===================== -->
    <!-- ANIMATED TRAIL LAYER  -->
    <!-- ===================== -->

    @if (showParticles()) {
      <!-- Thunder/Lightning Layers -->
      <!-- Pinned to the wire with high-frequency jitter -->
      <g [attr.mask]="'url(#particleMask-' + instanceId + ')'">
        <!-- Base Aura -->
        <path
          #trailGlowRef
          class="trail-glow"
          [attr.d]="pathData()"
          fill="none"
          [attr.stroke]="color()"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          [attr.filter]="'url(#neonGlow-' + instanceId + ')'"
        />

        <!-- Electric Strands -->
        <path
          #lightningPath1
          class="lightning-wisp wisp-1"
          [attr.d]="pathData()"
          fill="none"
          stroke="white"
          stroke-width="1.5"
          [attr.filter]="'url(#lightningFilter-' + instanceId + ')'"
        />

        <path
          #lightningPath2
          class="lightning-wisp wisp-2"
          [attr.d]="pathData()"
          fill="none"
          [attr.stroke]="color()"
          stroke-width="1"
          [attr.filter]="'url(#lightningFilter-' + instanceId + ')'"
        />

        <!-- Bright Core -->
        <path
          #particlePathRef
          class="trail-core"
          [attr.d]="pathData()"
          fill="none"
          stroke="white"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"
          [attr.filter]="'url(#coreGlow-' + instanceId + ')'"
        />
      </g>
    }
  </svg>
</div>
