<div class="wire-wrapper">
  <svg
    #svgRef
    [attr.viewBox]="viewBox"
    preserveAspectRatio="none"
    xmlns="http://www.w3.org/2000/svg"
    width="100%"
    height="100%"
    class="electric-svg"
  >
      <!-- 1. Broad Neon Glow Filter -->
      <filter [id]="'neonGlow-' + instanceId" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="1.5" result="blur1" />
        <feDropShadow dx="0" dy="0" stdDeviation="2" [attr.flood-color]="color" flood-opacity="0.8"/>
        <feComposite in="SourceGraphic" operator="over" />
      </filter>

      <!-- 2. Sharp Core Glow Filter -->
      <filter [id]="'coreGlow-' + instanceId" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="0.4" result="blur2" />
        <feComposite in="SourceGraphic" operator="over" />
      </filter>

      <!-- 3. Premium Arrowhead Shadow (Multi-layered Depth simulation) -->
      <filter [id]="'arrowShadow-' + instanceId" x="-100%" y="-100%" width="300%" height="300%">
        <!-- Base ambient shadow -->
        <feDropShadow dx="0" dy="1.5" stdDeviation="1" flood-color="black" flood-opacity="0.3"/>
        <!-- Focused drop shadow -->
        <feDropShadow dx="0" dy="3.5" stdDeviation="2.5" flood-color="black" flood-opacity="0.25"/>
        <!-- Inner highlight for 3D feel -->
        <feComposite in="SourceGraphic" in2="SourceAlpha" operator="out" result="insideShadow"/>
        <feFlood flood-color="white" flood-opacity="0.1" result="whiteFlood"/>
        <feComposite in="whiteFlood" in2="insideShadow" operator="in" result="innerHighlight"/>
        <feMerge>
            <feMergeNode in="SourceGraphic"/>
            <feMergeNode in="innerHighlight"/>
        </feMerge>
      </filter>

      <!-- 4. Path Shadow Replicated from house-on.svg / Group 2147204965.svg -->
      <filter [id]="'housePathShadow-' + instanceId" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
        <feColorMatrix type="matrix" values="0 0 0 0 0.14902 0 0 0 0 0.180392 0 0 0 0 0.188235 0 0 0 0.4 0" result="shadowMat"/>
        <feOffset dx="0" dy="0.5" result="offsetShadow"/>
        <feMerge>
          <feMergeNode in="offsetShadow"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- 4. Path Shadow Replicated from house-on.svg -->
      <filter [id]="'housePathShadow-' + instanceId" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
        <feColorMatrix type="matrix" values="0 0 0 0 0.14902 0 0 0 0 0.180392 0 0 0 0 0.188235 0 0 0 0.4 0" result="shadowMat"/>
        <feMerge>
          <feMergeNode in="shadowMat"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- Merging Graduate: Fades from white (visible) to black (hidden) -->
      <radialGradient [id]="'mergeGrad-' + instanceId">
        <stop offset="0%" stop-color="black" />
        <stop offset="50%" stop-color="black" stop-opacity="0.8" />
        <stop offset="100%" stop-color="white" />
      </radialGradient>

      <mask [id]="'particleMask-' + instanceId">
        <rect x="-100%" y="-100%" width="300%" height="300%" fill="white" />
        <circle 
          *ngIf="!reverse"
          [attr.cx]="endPoint.x" 
          [attr.cy]="endPoint.y" 
          r="8" 
          [attr.fill]="'url(#mergeGrad-' + instanceId + ')'" 
        />
        <circle 
          *ngIf="reverse"
          [attr.cx]="startPoint.x" 
          [attr.cy]="startPoint.y" 
          r="8" 
          [attr.fill]="'url(#mergeGrad-' + instanceId + ')'" 
        />
      </mask>

      <!-- Arrowhead with Shadow -->
      <marker
        [id]="'arrowhead-' + instanceId"
        viewBox="0 0 10 10"
        refX="10"
        refY="5"
        markerWidth="6"
        markerHeight="6"
        orient="auto-start-reverse"
      >
        <path 
          d="M 0 0 L 10 5 L 0 10 L 2 5 Z" 
          [attr.fill]="color" 
          [attr.filter]="'url(#arrowShadow-' + instanceId + ')'"
        />
      </marker>

    <!-- 1. The Wire Path Body (Base Lane) -->
    <path
      [attr.d]="pathData"
      fill="none"
      [attr.stroke]="color"
      stroke-width="3.2"
      stroke-opacity="0.08"
      stroke-linecap="round"
      stroke-linejoin="round"
      [attr.filter]="'url(#housePathShadow-' + instanceId + ')'"
    />

    <!-- 2. The Core Glowing Wire & Arrowhead (Static Base) -->
    <path
      #pathRef
      [attr.d]="pathData"
      fill="none"
      [attr.stroke]="color"
      stroke-width="1.2"
      stroke-opacity="0.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      [attr.filter]="'url(#housePathShadow-' + instanceId + ')'"
      [attr.marker-end]="!reverse ? 'url(#arrowhead-' + instanceId + ')' : ''"
      [attr.marker-start]="reverse ? 'url(#arrowhead-' + instanceId + ')' : ''"
    />

    <!-- 3. Elegant Moving Trail - Layer 1: Outer Neon Glow -->
    <path
      *ngIf="showParticles"
      class="trail-glow"
      [attr.d]="pathData"
      fill="none"
      [attr.stroke]="color"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      [attr.filter]="'url(#neonGlow-' + instanceId + ')'"
      [attr.mask]="'url(#particleMask-' + instanceId + ')'"
    />

    <!-- 4. Elegant Moving Trail - Layer 2: Bright Inner Core -->
    <path
      *ngIf="showParticles"
      #particlePathRef
      class="trail-core"
      [attr.d]="pathData"
      fill="none"
      stroke="white"
      stroke-width="1.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      [attr.filter]="'url(#coreGlow-' + instanceId + ')'"
      [attr.mask]="'url(#particleMask-' + instanceId + ')'"
    />
  </svg>
</div>
